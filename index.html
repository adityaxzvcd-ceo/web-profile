<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Calculator Modern Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            min-height: 100vh;
            color: #1e293b;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .result-card {
            background: #ffffff;
            border-radius: 20px;
            transition: all 0.3s ease;
            border: 1px solid #f1f5f9;
        }

        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .accent-gradient {
            background: linear-gradient(to right, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-5xl mx-auto">
        <div class="text-center mb-10">
            <div class="inline-block bg-white/30 backdrop-blur-md px-4 py-1 rounded-full text-white text-xs font-bold tracking-widest mb-4 uppercase">
                Network Tools v2.0
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-white drop-shadow-md">
                Kalkulator IP Subnet
            </h1>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4">
                <div class="glass-container rounded-[32px] p-8 sticky top-8">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i data-lucide="cpu" class="text-indigo-600"></i> Konfigurasi
                    </h2>
                    
                    <div class="space-y-6">
                        <div class="group">
                            <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Alamat IP</label>
                            <input type="text" id="ipInput" placeholder="192.168.1.1" 
                                class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 outline-none focus:border-indigo-500 transition-all font-mono text-indigo-700">
                        </div>

                        <div class="group">
                            <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Prefix (CIDR)</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">/</span>
                                <input type="number" id="prefixInput" placeholder="24" min="0" max="32"
                                    class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 pl-8 outline-none focus:border-indigo-500 transition-all font-mono text-indigo-700">
                            </div>
                        </div>

                        <button onclick="calculate()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-4 rounded-2xl shadow-xl shadow-indigo-200 transition-all active:scale-95 flex items-center justify-center gap-2">
                            <i data-lucide="sparkles" class="w-5 h-5"></i> HITUNG SEKARANG
                        </button>
                    </div>
                </div>
            </div>

            <div id="resultPanel" class="lg:col-span-8 space-y-6 hidden">
                
                <div class="glass-container rounded-[32px] p-8">
                    <h2 class="text-2xl font-bold mb-8 accent-gradient">Hasil Analisis Jaringan</h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="result-card p-5">
                            <div class="flex items-center gap-3 mb-2">
                                <div class="p-2 bg-emerald-100 rounded-lg text-emerald-600"><i data-lucide="network" size="18"></i></div>
                                <span class="text-xs font-bold text-slate-400 uppercase">Network ID</span>
                            </div>
                            <p id="resNetwork" class="text-xl font-mono font-bold text-slate-800"></p>
                        </div>

                        <div class="result-card p-5">
                            <div class="flex items-center gap-3 mb-2">
                                <div class="p-2 bg-blue-100 rounded-lg text-blue-600"><i data-lucide="shield-check" size="18"></i></div>
                                <span class="text-xs font-bold text-slate-400 uppercase">Subnet Mask</span>
                            </div>
                            <p id="resMask" class="text-xl font-mono font-bold text-slate-800"></p>
                        </div>

                        <div class="result-card p-5">
                            <div class="flex items-center gap-3 mb-2">
                                <div class="p-2 bg-rose-100 rounded-lg text-rose-600"><i data-lucide="radio" size="18"></i></div>
                                <span class="text-xs font-bold text-slate-400 uppercase">Broadcast</span>
                            </div>
                            <p id="resBroadcast" class="text-xl font-mono font-bold text-slate-800"></p>
                        </div>

                        <div class="result-card p-5 border-2 border-indigo-100 shadow-sm">
                            <div class="flex items-center gap-3 mb-2">
                                <div class="p-2 bg-indigo-100 rounded-lg text-indigo-600"><i data-lucide="users" size="18"></i></div>
                                <span class="text-xs font-bold text-slate-400 uppercase">IP Bisa Digunakan</span>
                            </div>
                            <p id="resUsable" class="text-2xl font-mono font-black text-indigo-600"></p>
                        </div>
                    </div>

                    <div class="mt-8 p-6 bg-slate-50 rounded-2xl">
                        <div class="flex justify-between text-xs font-bold mb-2">
                            <span class="text-slate-400">Pemanfaatan Address</span>
                            <span id="resTotalLabel" class="text-indigo-600"></span>
                        </div>
                        <div class="w-full bg-slate-200 h-3 rounded-full overflow-hidden">
                            <div id="hostBar" class="bg-indigo-500 h-full transition-all duration-1000" style="width: 0%"></div>
                        </div>
                        <p class="text-[10px] text-slate-400 mt-2 italic">*Mengurangi 2 alamat (Network & Broadcast) dari total kapasitas.</p>
                    </div>
                </div>

                <div class="glass-container rounded-[32px] p-8">
                    <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
                        <i data-lucide="book-open" class="text-pink-500"></i> Cara Menghitungnya
                    </h3>
                    
                    <div id="stepDetail" class="space-y-4">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function ipToInt(ip) {
            return ip.split('.').reduce((res, item) => (res << 8) + parseInt(item), 0) >>> 0;
        }

        function intToIp(int) {
            return [(int >>> 24) & 0xFF, (int >>> 16) & 0xFF, (int >>> 8) & 0xFF, int & 0xFF].join('.');
        }

        function calculate() {
            const ipStr = document.getElementById('ipInput').value;
            const prefix = parseInt(document.getElementById('prefixInput').value);

            if (!/^(\d{1,3}\.){3}\d{1,3}$/.test(ipStr) || isNaN(prefix) || prefix < 0 || prefix > 32) {
                alert("Ups! Format IP atau Prefix-nya salah tuh.");
                return;
            }

            const ipInt = ipToInt(ipStr);
            const maskInt = (prefix === 0 ? 0 : (0xFFFFFFFF << (32 - prefix))) >>> 0;
            const networkInt = (ipInt & maskInt) >>> 0;
            const broadcastInt = (networkInt | (~maskInt)) >>> 0;
            const totalAddr = Math.pow(2, (32 - prefix));
            const usable = prefix <= 30 ? totalAddr - 2 : (prefix === 31 ? 2 : 1);

            // Update Tampilan Utama
            document.getElementById('resNetwork').innerText = intToIp(networkInt);
            document.getElementById('resMask').innerText = intToIp(maskInt);
            document.getElementById('resBroadcast').innerText = intToIp(broadcastInt);
            document.getElementById('resUsable').innerText = `${usable.toLocaleString()} IP`;
            document.getElementById('resTotalLabel').innerText = `${usable} dari ${totalAddr} Alamat`;
            
            // Animasi Bar
            setTimeout(() => {
                document.getElementById('hostBar').style.width = (usable/totalAddr * 100) + '%';
            }, 100);

            // Update Detail Rumus dengan Angka Nyata
            const steps = `
                <div class="p-4 rounded-xl bg-indigo-50 border border-indigo-100 text-sm">
                    <p class="font-bold text-indigo-900 mb-1">Langkah 1: Subnet Mask</p>
                    <p>Prefix /${prefix} berarti ada ${prefix} bit angka satu. Hasilnya: <span class="font-mono font-bold">${intToIp(maskInt)}</span></p>
                </div>
                <div class="p-4 rounded-xl bg-pink-50 border border-pink-100 text-sm">
                    <p class="font-bold text-pink-900 mb-1">Langkah 2: Menghitung IP Terpakai</p>
                    <p>Rumus: 2^(32 - ${prefix}) - 2</p>
                    <p>2^${32-prefix} = ${totalAddr} (Total) - 2 = <span class="font-bold text-pink-600">${usable} Alamat Valid</span></p>
                </div>
                <div class="p-4 rounded-xl bg-slate-50 border border-slate-200 text-sm">
                    <p class="font-bold text-slate-900 mb-1">Langkah 3: Rentang Host</p>
                    <p>Mulai dari: <span class="font-mono">${intToIp(networkInt + 1)}</span></p>
                    <p>Sampai: <span class="font-mono">${intToIp(broadcastInt - 1)}</span></p>
                </div>
            `;
            document.getElementById('stepDetail').innerHTML = steps;

            document.getElementById('resultPanel').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('resultPanel').offsetTop - 20, behavior: 'smooth' });
        }
    </script>
</body>
</html>
