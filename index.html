<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Subnet Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-lg w-full glass rounded-2xl p-8 shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">IP Subnet Calculator</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-400">IP Address</label>
                <input type="text" id="ipInput" placeholder="e.g. 192.168.1.1" 
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-400">Prefix (CIDR)</label>
                <input type="number" id="prefixInput" placeholder="24" min="0" max="32"
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>

            <button onclick="calculate()" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg mt-4 transition-all active:scale-95">
                Calculate
            </button>
        </div>

        <div id="results" class="mt-8 space-y-3 hidden">
            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-gray-400">Network Address:</span>
                <span id="resNetwork" class="font-mono text-green-400"></span>
            </div>
            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-gray-400">Subnet Mask:</span>
                <span id="resMask" class="font-mono text-yellow-400"></span>
            </div>
            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-gray-400">Broadcast Address:</span>
                <span id="resBroadcast" class="font-mono text-red-400"></span>
            </div>
            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-gray-400">Usable Host Range:</span>
                <span id="resRange" class="font-mono text-blue-300 text-sm"></span>
            </div>
            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-gray-400">Total Hosts:</span>
                <span id="resHosts" class="font-mono"></span>
            </div>
        </div>
    </div>

    <script>
        function ipToInt(ip) {
            return ip.split('.').reduce((res, item) => (res << 8) + parseInt(item), 0) >>> 0;
        }

        function intToIp(int) {
            return [(int >>> 24) & 0xFF, (int >>> 16) & 0xFF, (int >>> 8) & 0xFF, int & 0xFF].join('.');
        }

        function calculate() {
            const ipStr = document.getElementById('ipInput').value;
            const prefix = parseInt(document.getElementById('prefixInput').value);

            if (!ipStr || isNaN(prefix) || prefix < 0 || prefix > 32) {
                alert("Masukkan IP dan Prefix yang valid!");
                return;
            }

            const ipInt = ipToInt(ipStr);
            const maskInt = (0xFFFFFFFF << (32 - prefix)) >>> 0;
            const networkInt = (ipInt & maskInt) >>> 0;
            const broadcastInt = (networkInt | (~maskInt)) >>> 0;
            
            const totalHosts = Math.max(0, broadcastInt - networkInt + 1);
            const usableHosts = prefix <= 30 ? totalHosts - 2 : (prefix === 31 ? 2 : 1);

            document.getElementById('resNetwork').innerText = intToIp(networkInt);
            document.getElementById('resMask').innerText = intToIp(maskInt);
            document.getElementById('resBroadcast').innerText = intToIp(broadcastInt);
            document.getElementById('resHosts').innerText = `${usableHosts.toLocaleString()} Usable`;
            
            if (prefix <= 30) {
                document.getElementById('resRange').innerText = `${intToIp(networkInt + 1)} - ${intToIp(broadcastInt - 1)}`;
            } else {
                document.getElementById('resRange').innerText = "N/A";
            }

            document.getElementById('results').classList.remove('hidden');
        }
    </script>
</body>
</html>
