<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Calculator Clean Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #e2e8f0; }

.glass-container { background: #1e293b; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

.result-card { background: #0f172a; border-radius: 16px; border: 1px solid #334155; }

.input { background: #020617; border: 1px solid #334155; color: #e2e8f0; } </style>

</head>
<body class="py-10 px-4"><div class="max-w-5xl mx-auto"><div class="text-center mb-10">
<h1 class="text-4xl font-bold">IP Subnet Calculator</h1>
<p class="text-slate-400 text-sm">Simple • Clean • Fast</p>
</div><div class="grid grid-cols-1 lg:grid-cols-12 gap-8"><div class="lg:col-span-4">
<div class="glass-container rounded-2xl p-6 sticky top-6"><h2 class="font-bold mb-4 flex gap-2 items-center">
<i data-lucide="cpu"></i> Input
</h2><div class="space-y-4">
<input id="ipInput" placeholder="192.168.1.1" class="input w-full p-3 rounded-xl"><div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">/</span>
<input id="prefixInput" type="number" placeholder="24" class="input w-full p-3 pl-6 rounded-xl">
</div><button onclick="calculate()" class="w-full bg-slate-600 hover:bg-slate-500 p-3 rounded-xl font-bold">Hitung</button>

</div></div>
</div><div id="resultPanel" class="lg:col-span-8 space-y-4 hidden"><div class="glass-container rounded-2xl p-6"><h2 class="text-lg font-bold mb-4">Hasil</h2><div class="grid grid-cols-2 gap-4">
<div class="result-card p-4">
<p class="text-xs text-slate-400">Network</p>
<p id="resNetwork" class="font-mono"></p>
</div><div class="result-card p-4">
<p class="text-xs text-slate-400">Mask</p>
<p id="resMask" class="font-mono"></p>
</div><div class="result-card p-4">
<p class="text-xs text-slate-400">Broadcast</p>
<p id="resBroadcast" class="font-mono"></p>
</div><div class="result-card p-4">
<p class="text-xs text-slate-400">Usable</p>
<p id="resUsable" class="font-mono"></p>
</div>
</div><p class="mt-4 text-sm">Range: <span id="range" class="font-mono"></span></p>
<p id="note" class="text-xs text-slate-400 mt-1"></p></div></div></div>
</div><script>
lucide.createIcons();

function isValidIP(ip) {
    const parts = ip.split('.');
    if (parts.length !== 4) return false;
    return parts.every(p => {
        const num = Number(p);
        return num >= 0 && num <= 255;
    });
}

function ipToInt(ip) {
    return ip.split('.').reduce((res, item) => (res << 8) + parseInt(item), 0) >>> 0;
}

function intToIp(int) {
    return [(int >>> 24) & 255, (int >>> 16) & 255, (int >>> 8) & 255, int & 255].join('.');
}

function calculate() {
    const ipStr = document.getElementById('ipInput').value;
    const prefix = parseInt(document.getElementById('prefixInput').value);

    if (!ipStr || isNaN(prefix)) return;

    if (!isValidIP(ipStr) || prefix < 0 || prefix > 32) {
        alert('Input tidak valid');
        return;
    }

    const ipInt = ipToInt(ipStr);
    const maskInt = (prefix === 0 ? 0 : (0xFFFFFFFF << (32 - prefix))) >>> 0;
    const networkInt = (ipInt & maskInt) >>> 0;
    const broadcastInt = (networkInt | (~maskInt)) >>> 0;
    const total = Math.pow(2, (32 - prefix));
    const usable = prefix <= 30 ? total - 2 : (prefix === 31 ? 2 : 1);

    document.getElementById('resNetwork').innerText = intToIp(networkInt);
    document.getElementById('resMask').innerText = intToIp(maskInt);
    document.getElementById('resBroadcast').innerText = intToIp(broadcastInt);
    document.getElementById('resUsable').innerText = usable;
    document.getElementById('range').innerText = intToIp(networkInt + 1) + ' - ' + intToIp(broadcastInt - 1);

    let note = '';
    if (prefix === 31) note = 'Point-to-point network';
    if (prefix === 32) note = 'Single host only';
    document.getElementById('note').innerText = note;

    document.getElementById('resultPanel').classList.remove('hidden');
}
</script></body>
</html>
