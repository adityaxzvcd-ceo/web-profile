<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Calculator Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');body { font-family: 'Inter', sans-serif; background: #0b1220; color: #e5e7eb; }

.card { background: #111827; border: 1px solid #1f2937; border-radius: 16px; }

.input { background: #020617; border: 1px solid #1f2937; color: #e5e7eb; }

.label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; } </style>

</head>
<body class="p-6"><div class="max-w-6xl mx-auto space-y-6"><!-- HEADER --><div class="flex justify-between items-center">
<h1 class="text-2xl font-semibold">IP Subnet Calculator</h1>
<span class="text-xs text-slate-500">Pro Edition</span>
</div><div class="grid grid-cols-1 lg:grid-cols-3 gap-6"><!-- INPUT PANEL --><div class="card p-6 space-y-5"><div>
<p class="label mb-2">Alamat IP</p>
<input id="ipInput" class="input w-full p-3 rounded-lg" placeholder="192.168.1.1">
</div><div>
<p class="label mb-2">Prefix (CIDR)</p>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">/</span>
<input id="prefixInput" type="number" class="input w-full p-3 pl-6 rounded-lg" placeholder="24">
</div>
</div><button onclick="calculate()" class="w-full bg-indigo-600 hover:bg-indigo-500 p-3 rounded-lg font-semibold">
Hitung
</button></div><!-- RESULT PANEL --><div class="lg:col-span-2 space-y-6"><div id="result" class="card p-6 hidden"><div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm"><div>
<p class="label">Network</p>
<p id="network" class="font-mono"></p>
</div><div>
<p class="label">Mask</p>
<p id="mask" class="font-mono"></p>
</div><div>
<p class="label">Broadcast</p>
<p id="broadcast" class="font-mono"></p>
</div><div>
<p class="label">Usable</p>
<p id="usable" class="font-mono text-indigo-400"></p>
</div></div><hr class="my-5 border-slate-800"><div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm"><div>
<p class="label">Range IP</p>
<p id="range" class="font-mono"></p>
</div><div>
<p class="label">Total Address</p>
<p id="total" class="font-mono"></p>
</div></div><p id="note" class="text-xs text-slate-500 mt-3"></p></div></div></div></div><script>
lucide.createIcons();

function isValidIP(ip) {
    const parts = ip.split('.');
    if (parts.length !== 4) return false;
    return parts.every(p => {
        const num = Number(p);
        return num >= 0 && num <= 255;
    });
}

function ipToInt(ip) {
    return ip.split('.').reduce((res, item) => (res << 8) + parseInt(item), 0) >>> 0;
}

function intToIp(int) {
    return [(int >>> 24) & 255, (int >>> 16) & 255, (int >>> 8) & 255, int & 255].join('.');
}

function calculate() {
    const ipStr = document.getElementById('ipInput').value;
    const prefix = parseInt(document.getElementById('prefixInput').value);

    if (!ipStr || isNaN(prefix)) return;

    if (!isValidIP(ipStr) || prefix < 0 || prefix > 32) {
        alert('Input tidak valid');
        return;
    }

    const ipInt = ipToInt(ipStr);
    const maskInt = (prefix === 0 ? 0 : (0xFFFFFFFF << (32 - prefix))) >>> 0;
    const networkInt = (ipInt & maskInt) >>> 0;
    const broadcastInt = (networkInt | (~maskInt)) >>> 0;
    const total = Math.pow(2, (32 - prefix));
    const usable = prefix <= 30 ? total - 2 : (prefix === 31 ? 2 : 1);

    document.getElementById('network').innerText = intToIp(networkInt);
    document.getElementById('mask').innerText = intToIp(maskInt);
    document.getElementById('broadcast').innerText = intToIp(broadcastInt);
    document.getElementById('usable').innerText = usable;
    document.getElementById('range').innerText = intToIp(networkInt + 1) + ' - ' + intToIp(broadcastInt - 1);
    document.getElementById('total').innerText = total;

    let note = '';
    if (prefix === 31) note = 'Point-to-point network';
    if (prefix === 32) note = 'Single host only';
    document.getElementById('note').innerText = note;

    document.getElementById('result').classList.remove('hidden');
}
</script></body>
</html>
